spring.application.name=flightspotter

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flightspotter}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# JWT
jwt.secret=${JWT_SECRET:flightspotter-default-secret-change-this}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload-dir=${UPLOAD_DIR:uploads}

# OpenSky Network credentials (optional, increases rate limits)
opensky.username=${OPENSKY_USERNAME:}
opensky.password=${OPENSKY_PASSWORD:}

# Frontend URL (CORS)
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Server
server.port=8080

# Logging
logging.level.com.flightspotter=INFO
logging.level.liquibase=WARN
